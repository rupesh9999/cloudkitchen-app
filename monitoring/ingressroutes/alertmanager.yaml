# Edited in Phase 7 — flipped from HTTP (web) to HTTPS (websecure) with the
# cloudkitchen-tls Secret duplicated into this namespace (cert-manager only
# refreshes the original in cloudkitchen ns; re-duplicate after renewal).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: alertmanager
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  entryPoints:
  - websecure
  routes:
  - match: (Host(`vijaygiduthuri.in`) || Host(`35.224.38.103`)) && PathPrefix(`/alertmanager`)
    kind: Rule
    services:
    - name: kube-prometheus-alertmanager
      port: 9093
  tls:
    secretName: cloudkitchen-tls
