# =============================================================================
# TLS certificate for vijaygiduthuri.in.
#
# cert-manager obtains a real Let's Encrypt certificate via the
# letsencrypt-prod ClusterIssuer (HTTP-01 challenge through Traefik) and
# stores it in the `cloudkitchen-tls` Secret. The Traefik IngressRoute
# (rendered by helm/cloudkitchen, with ingress.tls=true) references this
# Secret. cert-manager auto-renews 15 days before expiry.
#
# Apply with:
#   kubectl apply -f security/cert-manager/certificate.yaml
# =============================================================================
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cloudkitchen-tls
  namespace: cloudkitchen
spec:
  secretName: cloudkitchen-tls
  duration: 2160h      # 90 days
  renewBefore: 360h    # renew 15 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  issuerRef:
    name: letsencrypt-prod   # -> letsencrypt-prod for production
    kind: ClusterIssuer
    group: cert-manager.io
  commonName: vijaygiduthuri.in
  dnsNames:
    - vijaygiduthuri.in
